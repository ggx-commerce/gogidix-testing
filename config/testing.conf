# Gogidix Testing Configuration

# General Settings
project_name=gogidix-testing
project_version=1.0.0

# k6 Settings
k6_version=0.47.0
k6_output_format=json

# Default Test Settings
default_environment=dev
default_test_type=load
default_vus=100
default_duration=5m

# Thresholds - Financial Grade
threshold_error_rate=0.02
threshold_p95_ms=2000
threshold_p99_ms=5000
threshold_throughput=100

# Reporting
report_output_dir=reports
report_retention_days=90
generate_html_reports=true

# GitHub Integration
github_repository=gogidix/gogidix-testing
github_workflow_branch=main

# Notification (optional)
enable_slack_notifications=false
slack_webhook_url=
enable_email_notifications=false
email_recipients=

# Monitoring Integration
enable_influxdb_export=false
influxdb_url=http://localhost:8086
influxdb_database=k6

enable_prometheus_export=false
prometheus_gateway_url=http://localhost:9091
