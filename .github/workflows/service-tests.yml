# Gogidix Testing Infrastructure - Service Testing Workflow
# Runs Financial-Grade tests for services from shared-business-logics
#
# Shared libraries are consumed from GitHub Packages (foundation-domain)

name: Service Tests

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to test'
        required: true
        type: choice
        options:
          - ai-fraud-detection-service
          - ai-security-analysis-service
          - ai-authentication-service
          - anomaly-detection-service
      test_type:
        description: 'Test type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - compile-only
          - unit-tests-only
          - coverage-only
      skip_mutation:
        description: 'Skip mutation testing (faster)'
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xms1024m -Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC'
  COVERAGE_THRESHOLD_LINE: 85
  COVERAGE_THRESHOLD_BRANCH: 75
  COVERAGE_THRESHOLD_MUTATION: 60
  SERVICE_BASE_PATH: 'ai-services/Backend/Java/security-fraud-prevention'

defaults:
  run:
    shell: bash

jobs:
  # ============================================
  # STAGE 0: SETUP GITHUB PACKAGES
  # ============================================
  setup-github-packages:
    name: Setup GitHub Packages
    runs-on: self-hosted

    steps:
      - name: Install JDK 17 manually (bypasses setup-java)
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.PAT_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
          echo "✓ Maven configured for GitHub Packages"
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Verify GitHub Packages access
        run: |
          echo "Verifying access to GitHub Packages..."
          mvn dependency:get -B \
            -DremoteRepositories=github::https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain \
            -Dartifact=com.gogidix.shared:shared-libraries-bom:1.0.0:pom || echo "Note: BOM verification"
          echo "✓ GitHub Packages configuration complete"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

  # ============================================
  # STAGE 1: COMPILE
  # ============================================
  compile:
    name: Compile Service
    runs-on: self-hosted
    needs: setup-github-packages
    outputs:
      service_path: ${{ steps.set_paths.outputs.service_path }}

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Install JDK 17 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.PAT_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

      - name: Set service paths
        id: set_paths
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          SERVICE_PATH="${{ env.SERVICE_BASE_PATH }}/${SERVICE}"
          echo "service_path=${SERVICE_PATH}" >> $GITHUB_OUTPUT
          echo "Service: ${SERVICE}"
          echo "Path: ${SERVICE_PATH}"

      - name: Compile service
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          SERVICE_PATH="${{ env.SERVICE_BASE_PATH }}/${SERVICE}"
          echo "============================================"
          echo "Compiling: ${SERVICE_PATH}"
          echo "============================================"

          ls -la ${SERVICE_PATH} || echo "Directory not found!"

          if [ -f "${SERVICE_PATH}/pom.xml" ]; then
            echo "pom.xml found"
          else
            echo "ERROR: pom.xml not found in ${SERVICE_PATH}"
            exit 1
          fi

          cd ${SERVICE_PATH}
          echo "Current directory: $(pwd)"
          mvn compile -B 2>&1 | tee compile.log || {
            echo "============================================"
            echo "COMPILATION FAILED"
            echo "============================================"
            cat compile.log
            exit 1
          }

      - name: Upload compile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compile-output
          path: ${{ steps.set_paths.outputs.service_path }}/target/classes/
          retention-days: 1

  # ============================================
  # STAGE 2: UNIT TESTS
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    needs: compile

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Install JDK 17 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$PAT_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

      - name: Run unit tests
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          SERVICE_PATH="${{ env.SERVICE_BASE_PATH }}/${SERVICE}"
          echo "Running unit tests for: ${SERVICE_PATH}"
          cd ${SERVICE_PATH}
          mvn test -B \
            -Dspring.data.mongodb.uri=mongodb://localhost:27017/fraud_detection_test \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fraud_detection_test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            target/surefire-reports/
            target/jacoco.exec
          retention-days: 30

  # ============================================
  # STAGE 3: BUILD JAR
  # ============================================
  build-jar:
    name: Build JAR
    runs-on: self-hosted
    needs: unit-tests

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Install JDK 17 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$PAT_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

      - name: Package JAR
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Building JAR for: ${{ github.event.inputs.service }}"
          mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-jar
          path: target/*.jar
          retention-days: 30

  # ============================================
  # STAGE 4: SMOKE TESTS
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: self-hosted
    needs: build-jar

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Install JDK 17 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$PAT_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

      - name: Run smoke tests
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Running smoke tests for: ${{ github.event.inputs.service }}"
          mvn test -B \
            -Dtest=SmokeTest \
            -Dspring.data.mongodb.uri=mongodb://localhost:27017/fraud_detection_test
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fraud_detection_test

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: target/surefire-reports/
          retention-days: 30

  # ============================================
  # STAGE 5: COVERAGE REPORT
  # ============================================
  coverage:
    name: Coverage Report
    runs-on: self-hosted
    needs: [unit-tests, smoke-tests]

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Install JDK 17 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$PAT_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

      - name: Generate coverage report
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Generating coverage for: ${{ github.event.inputs.service }}"
          mvn verify -B \
            -Dspring.data.mongodb.uri=mongodb://localhost:27017/fraud_detection_test
          mvn jacoco:report -B

      - name: Check coverage thresholds
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Checking Financial-Grade coverage thresholds..."
          echo "- Line Coverage: >= ${{ env.COVERAGE_THRESHOLD_LINE }}%"
          echo "- Branch Coverage: >= ${{ env.COVERAGE_THRESHOLD_BRANCH }}%"
          echo "- Mutation Score: >= ${{ env.COVERAGE_THRESHOLD_MUTATION }}%"
          mvn jacoco:check -B || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
          retention-days: 30

  # ============================================
  # STAGE 6: MUTATION TESTS (Optional)
  # ============================================
  mutation:
    name: Mutation Tests
    runs-on: self-hosted
    needs: coverage
    if: github.event.inputs.skip_mutation != 'true'

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Install JDK 17 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$PAT_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub Packages</name>
                    <url>https://maven.pkg.github.com/ggx-commerce/gogidix-foundation-domain</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-github-packages-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-github-packages-

      - name: Run mutation tests
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Running mutation tests for: ${{ github.event.inputs.service }}"
          mvn verify -Pci -B
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fraud_detection_test

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: target/pit-reports/
          retention-days: 30

  # ============================================
  # STAGE 7: FINAL REPORT
  # ============================================
  report:
    name: Generate Final Report
    runs-on: self-hosted
    needs: [compile, unit-tests, build-jar, smoke-tests, coverage]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate summary report
        run: |
          mkdir -p reports
          cat > reports/test-summary.md << EOF
          # Test Report: ${{ github.event.inputs.service }}

          **Run Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow Run:** ${{ github.run_number }}

          ## Pipeline Status

          | Stage | Status |
          |-------|--------|
          | Compile | ${{ needs.compile.result }} |
          | Unit Tests | ${{ needs.unit-tests.result }} |
          | Build JAR | ${{ needs.build-jar.result }} |
          | Smoke Tests | ${{ needs.smoke-tests.result }} |
          | Coverage | ${{ needs.coverage.result }} |

          ## Financial-Grade Thresholds

          - **Line Coverage:** >= ${{ env.COVERAGE_THRESHOLD_LINE }}%
          - **Branch Coverage:** >= ${{ env.COVERAGE_THRESHOLD_BRANCH }}%
          - **Mutation Score:** >= ${{ env.COVERAGE_THRESHOLD_MUTATION }}%

          ## Artifacts

          - Unit test results
          - Coverage report
          - JAR artifact
          EOF

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: reports/
          retention-days: 90
