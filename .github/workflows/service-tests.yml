# Gogidix Testing Infrastructure - Service Testing Workflow
# Runs Financial-Grade tests for services pulled from shared-business-logics
#
# Pipeline Stages:
# 1. Checkout shared-business-logics
# 2. Compile
# 3. Build
# 4. Test (Unit + Integration)
# 5. Build JAR
# 6. Smoke Test
# 7. Coverage Report

name: Service Tests

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to test'
        required: true
        type: choice
        options:
          - ai-fraud-detection-service
          - ai-security-analysis-service
          - ai-authentication-service
          - anomaly-detection-service
      test_type:
        description: 'Test type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - compile-only
          - unit-tests-only
          - coverage-only
      skip_mutation:
        description: 'Skip mutation testing (faster)'
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xms1024m -Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC'
  COVERAGE_THRESHOLD_LINE: 85
  COVERAGE_THRESHOLD_BRANCH: 75
  COVERAGE_THRESHOLD_MUTATION: 60
  SERVICE_BASE_PATH: 'ai-services/Backend/Java/security-fraud-prevention'

jobs:
  # ============================================
  # STAGE 1: SETUP & COMPILE
  # ============================================
  compile:
    name: Compile Service
    runs-on: ubuntu-latest
    outputs:
      service_path: ${{ steps.set_paths.outputs.service_path }}
    
    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set service paths
        id: set_paths
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          SERVICE_PATH="${{ env.SERVICE_BASE_PATH }}/${SERVICE}"
          echo "service_path=${SERVICE_PATH}" >> $GITHUB_OUTPUT
          echo "Service: ${SERVICE}"
          echo "Path: ${SERVICE_PATH}"

      - name: Compile service
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          SERVICE_PATH="${{ env.SERVICE_BASE_PATH }}/${SERVICE}"
          echo "Compiling: ${SERVICE_PATH}"
          
          # Build directly in the service directory
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          mvn compile -B
          
      - name: Upload compile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compile-output
          path: target/classes/
          retention-days: 1

  # ============================================
  # STAGE 2: UNIT TESTS
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: compile
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Running unit tests for: ${{ github.event.inputs.service }}"
          
          mvn test -B \
            -Dspring.data.mongodb.uri=mongodb://localhost:27017/fraud_detection_test \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fraud_detection_test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            target/surefire-reports/
            target/jacoco.exec
          retention-days: 30

  # ============================================
  # STAGE 3: BUILD JAR
  # ============================================
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Package JAR
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Building JAR for: ${{ github.event.inputs.service }}"
          
          mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-jar
          path: target/*.jar
          retention-days: 30

  # ============================================
  # STAGE 4: SMOKE TESTS
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build-jar
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache=v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run smoke tests
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Running smoke tests for: ${{ github.event.inputs.service }}"
          
          mvn test -B \
            -Dtest=SmokeTest \
            -Dspring.data.mongodb.uri=mongodb://localhost:27017/fraud_detection_test
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fraud_detection_test

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: target/surefire-reports/
          retention-days: 30

  # ============================================
  # STAGE 5: COVERAGE REPORT
  # ============================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke-tests]
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache=v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Generate coverage report
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Generating coverage for: ${{ github.event.inputs.service }}"
          
          # Run tests with JaCoCo
          mvn verify -B \
            -Dspring.data.mongodb.uri=mongodb://localhost:27017/fraud_detection_test
          
          # Generate JaCoCo report
          mvn jacoco:report -B

      - name: Check coverage thresholds
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Checking Financial-Grade coverage thresholds..."
          echo "- Line Coverage: >= ${{ env.COVERAGE_THRESHOLD_LINE }}%"
          echo "- Branch Coverage: >= ${{ env.COVERAGE_THRESHOLD_BRANCH }}%"
          echo "- Mutation Score: >= ${{ env.COVERAGE_THRESHOLD_MUTATION }}%"
          
          # Run JaCoCo check
          mvn jacoco:check -B || true

      - name: Upload coverage report
        uses: actions/upload-artifact=v4
        with:
          name: coverage-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
          retention-days: 30

  # ============================================
  # STAGE 6: MUTATION TESTS (Optional)
  # ============================================
  mutation:
    name: Mutation Tests
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event.inputs.skip_mutation != 'true'
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout=v4
        with:
          repository: ggx-commerce/shared-business-logics
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java=v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache=v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run mutation tests
        run: |
          cd ${{ env.SERVICE_BASE_PATH }}/${{ github.event.inputs.service }}
          echo "Running mutation tests for: ${{ github.event.inputs.service }}"
          
          mvn verify -Pci -B
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fraud_detection_test

      - name: Upload mutation report
        uses: actions/upload-artifact=v4
        with:
          name: mutation-report
          path: target/pit-reports/
          retention-days: 30

  # ============================================
  # STAGE 7: FINAL REPORT
  # ============================================
  report:
    name: Generate Final Report
    runs-on: ubuntu-latest
    needs: [compile, unit-tests, build-jar, smoke-tests, coverage]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact=v4
        with:
          path: artifacts/

      - name: Generate summary report
        run: |
          mkdir -p reports
          
          cat > reports/test-summary.md << EOF
          # Test Report: ${{ github.event.inputs.service }}
          
          **Run Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow Run:** ${{ github.run_number }}
          
          ## Pipeline Status
          
          | Stage | Status |
          |-------|--------|
          | Compile | ${{ needs.compile.result }} |
          | Unit Tests | ${{ needs.unit-tests.result }} |
          | Build JAR | ${{ needs.build-jar.result }} |
          | Smoke Tests | ${{ needs.smoke-tests.result }} |
          | Coverage | ${{ needs.coverage.result }} |
          
          ## Financial-Grade Thresholds
          
          - **Line Coverage:** >= ${{ env.COVERAGE_THRESHOLD_LINE }}%
          - **Branch Coverage:** >= ${{ env.COVERAGE_THRESHOLD_BRANCH }}%
          - **Mutation Score:** >= ${{ env.COVERAGE_THRESHOLD_MUTATION }}%
          
          ## Artifacts
          
          - Unit test results
          - Coverage report
          - JAR artifact
          EOF

      - name: Upload final report
        uses: actions/upload-artifact=v4
        with:
          name: final-report
          path: reports/
          retention-days: 90