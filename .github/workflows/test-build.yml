name: Test Service Build

on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shared-business-logics
        uses: actions/checkout@v4
        with:
          repository: ggx-commerce/shared-business-logics
          ref: dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Try to compile service
        run: |
          cd ai-services/Backend/Java/security-fraud-prevention/ai-fraud-detection-service
          mvn compile -B -e